name: Amazon Scraper Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *' # Optional: Runs every day at midnight

jobs:
  scrape-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: playwright install --with-deps

    - name: Run Scraper Pipeline with Virtual Screen
      # xvfb-run ensures a virtual display is available for the browser
      run: xvfb-run python pipline/run_amazon.py
      env:
        PYTHONPATH: .

    - name: Upload Scraped Data
      uses: actions/upload-artifact@v4
      with:
        name: amazon-scraped-data
        path: Data/export_data/